<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página CRUD - Sistema de Usuários</title>

    <style>
      /* RESET */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* GLOBAL */
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f6f8;
        color: #333;
        line-height: 1.6;
      }

      header {
        background-color: #1e3a8a;
        color: white;
        padding: 20px;
      }

      nav {
        margin-top: 10px;
      }

      nav a {
        color: white;
        text-decoration: none;
        margin-right: 20px;
        font-weight: bold;
      }

      nav a:hover {
        text-decoration: underline;
      }

      main {
        padding: 30px;
      }

      section {
        background-color: white;
        padding: 20px;
        margin-bottom: 25px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }

      h1 {
        margin-bottom: 10px;
      }

      h2 {
        margin-bottom: 15px;
        color: #1e3a8a;
      }

      /* FORMULÁRIOS */
      form {
        display: flex;
        flex-direction: column;
      }

      label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      /* BOTÕES ALINHADOS À DIREITA */
      button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        background-color: #1e3a8a;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        align-self: flex-end;
      }

      button:hover {
        background-color: #162d6b;
      }

      input[type="checkbox"] {
        width: auto;
        margin-right: 8px;
      }


      footer {
        background-color: #1e3a8a;
        color: white;
        text-align: center;
        padding: 15px;
        margin-top: 30px;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Sistema de Cadastro de Usuários</h1>
      <nav style="text-align: center;">
        <a href="index.html">Dashboard</a>
        <a href="crud.html">CRUD</a>
        <a href="usuarios.html">Usuários</a>
        <a href="relatorios.html">Relatórios</a>
        <a href="turmas.html">Turmas</a>
        <a href="cursos.html">Cursos</a>
        <a href="bolsa.html">Bolsas</a>
      </nav>
    </header>

    <main>
      <!-- CRIAR -->
      <section>
        <h2>Criar Usuário</h2>
        <form>
          <label>
            Nome Completo:
            <input type="text" required placeholder="Digite o nome" />
          </label>

          <label>
            E-mail:
            <input type="email" required placeholder="exemplo@email.com" />
          </label>

          <label>
            Senha:
            <input type="password" required placeholder="Crie uma senha forte" />
          </label>

          <button type="submit">Cadastrar Usuário</button>
        </form>
      </section>

      <!-- CONSULTAR -->
      <section>
        <h2>Consultar Usuários</h2>
        <form>
          <label>
            Buscar por nome ou email:
            <input type="search" required placeholder="Digite o nome ou email" />
          </label>

          <button type="submit">Pesquisar</button>
        </form>
      </section>

      <!-- ATUALIZAR -->
      <section>
        <h2>Atualizar Dados</h2>
        <p>Informe o e-mail do usuário que deseja alterar e os novos dados.</p>
        <form>
          <label>
            E-mail do Usuário Atual:
            <input type="email" required placeholder="Qual usuário editar?" />
          </label>

          <label>
            Novo Nome:
            <input type="text" placeholder="Deixe em branco para não alterar" />
          </label>

          <label>
            Senha:
            <input type="text" placeholder="Deixe em branco para não alterar" />
          </label>

          <button type="submit">Atualizar dados</button>
        </form>
      </section>

      <!-- DELETAR -->
      <section>
        <h2>Deletar Usuário</h2>
        <form>
          <label>
            E-mail do Usuário a deletar:
            <input type="email" required placeholder="Digite o email exato" />
          </label>

          <label>
            <input type="checkbox" required />
            Estou ciente de que essa ação é irreversível.
          </label>
            <button type="submit">Deletar usuário</button>
        </form>
      </section>
    </main>

    <footer>
      <p>Sistema HTML Semântico + CSS (Apenas Seletor de Tag) © 2026</p>
    </footer>
  </body>
</html>
