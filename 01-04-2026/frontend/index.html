<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de Carros - Sistema de Gerenciamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🚗 Sistema de Gerenciamento de Carros</h1>
            <p>Cadastre, edite e gerencie sua frota de veículos</p>
        </div>
    </header>

    <main class="container">
        <!-- Seção do Formulário -->
        <section class="card form-section">
            <h2>📝 Cadastro de Carro</h2>
            <form id="carroForm">
                <input type="hidden" id="carroId">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nome">
                            <span class="required">*</span> Nome do Carro:
                        </label>
                        <input type="text" 
                               id="nome" 
                               name="nome"
                               required 
                               placeholder="Ex: Civic"
                               autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="marca">
                            <span class="required">*</span> Marca:
                        </label>
                        <input type="text" 
                               id="marca" 
                               name="marca"
                               required 
                               placeholder="Ex: Honda"
                               autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="preco">
                            <span class="required">*</span> Preço (R$):
                        </label>
                        <input type="number" 
                               id="preco" 
                               name="preco"
                               required 
                               step="0.01" 
                               min="0"
                               placeholder="Ex: 120000.00">
                    </div>

                    <div class="form-group">
                        <label for="ano">
                            <span class="required">*</span> Ano:
                        </label>
                        <input type="number" 
                               id="ano" 
                               name="ano"
                               required 
                               min="1900" 
                               max="2026" 
                               placeholder="Ex: 2023">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        💾 Salvar Carro
                    </button>
                    <button type="button" class="btn btn-secondary" id="limparBtn">
                        🗑️ Limpar Formulário
                    </button>
                </div>
            </form>
        </section>

        <!-- Seção da Lista de Carros -->
        <section class="card list-section">
            <div class="list-header">
                <h2>📋 Lista de Carros</h2>
                <div class="search-box">
                    <input type="text" 
                           id="searchInput" 
                           placeholder="🔍 Buscar por nome ou marca..."
                           autocomplete="off">
                </div>
            </div>
            
            <div id="loadingMessage" class="loading-message">
                Carregando carros...
            </div>
            
            <div id="carrosList" class="carros-grid">
                <!-- Os carros serão carregados aqui via JavaScript -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 - Sistema de Gerenciamento de Carros. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
