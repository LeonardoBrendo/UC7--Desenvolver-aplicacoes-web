<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>⚖️ Calculadora de IMC</h1>
        <p>Descubra seu Índice de Massa Corporal</p>
        
        <form id="formIMC">
            <div class="campo">
                <label>Peso (kg):</label>
                <input type="number" id="peso" step="0.1" placeholder="Ex: 70.5" required>
            </div>
            
            <div class="campo">
                <label>Altura (m):</label>
                <input type="number" id="altura" step="0.01" placeholder="Ex: 1.75" required>
            </div>
            
            <button type="submit">Calcular IMC</button>
        </form>
        
        <div class="resultado" id="resultado" style="display: none;">
            <div class="imc-valor" id="imcValor"></div>
            <div class="classificacao" id="classificacao"></div>
        </div>
        
        <button id="btnLimpar" style="display: none;">Limpar</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
