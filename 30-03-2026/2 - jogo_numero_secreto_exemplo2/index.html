<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Número Secreto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>🎲 Jogo do Número Secreto</h1>
        <p>Tente adivinhar o número entre 1 e 100</p>
        
        <div class="jogo">
            <input type="number" id="palpite" placeholder="Digite seu palpite" min="1" max="100">
            <button id="btnChutar">Chutar</button>
            
            <div class="mensagem" id="mensagem"></div>
            <div class="tentativas">Tentativas: <span id="contador">0</span></div>
            <button id="btnNovoJogo" style="display: none;">Novo Jogo</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
